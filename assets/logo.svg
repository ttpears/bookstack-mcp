<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="bookstack-mcp logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F3A5F"/>
      <stop offset="100%" stop-color="#0E1B2E"/>
    </linearGradient>
    <linearGradient id="book-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E76F51"/>
      <stop offset="100%" stop-color="#C9523A"/>
    </linearGradient>
    <linearGradient id="book-mid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#D8854A"/>
    </linearGradient>
    <linearGradient id="book-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E9C46A"/>
      <stop offset="100%" stop-color="#C9A24E"/>
    </linearGradient>
    <radialGradient id="node-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7DC9D6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7DC9D6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Three stacked books, slightly offset -->
  <g>
    <!-- bottom -->
    <rect x="40" y="170" width="170" height="34" rx="5" fill="url(#book-bottom)"/>
    <rect x="56" y="178" width="4" height="18" rx="1" fill="#fff" fill-opacity="0.45"/>
    <rect x="66" y="178" width="4" height="18" rx="1" fill="#fff" fill-opacity="0.25"/>
    <!-- middle -->
    <rect x="50" y="128" width="150" height="34" rx="5" fill="url(#book-mid)"/>
    <rect x="66" y="136" width="4" height="18" rx="1" fill="#fff" fill-opacity="0.45"/>
    <rect x="76" y="136" width="4" height="18" rx="1" fill="#fff" fill-opacity="0.25"/>
    <!-- top -->
    <rect x="64" y="86" width="120" height="34" rx="5" fill="url(#book-top)"/>
    <rect x="80" y="94" width="4" height="18" rx="1" fill="#fff" fill-opacity="0.45"/>
    <rect x="90" y="94" width="4" height="18" rx="1" fill="#fff" fill-opacity="0.25"/>
  </g>

  <!-- MCP connection: line from top book to node -->
  <line x1="184" y1="92" x2="210" y2="56" stroke="#7DC9D6" stroke-width="3" stroke-linecap="round" stroke-opacity="0.8"/>

  <!-- Node with glow -->
  <circle cx="210" cy="56" r="22" fill="url(#node-glow)"/>
  <circle cx="210" cy="56" r="13" fill="#7DC9D6"/>
  <circle cx="210" cy="56" r="6" fill="#0E1B2E"/>
</svg>
