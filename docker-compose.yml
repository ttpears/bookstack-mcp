services:
  bookstack-mcp:
    image: ghcr.io/codyssey-ltd/bookstack-mcp:latest
    ports:
      - "8007:8007"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
