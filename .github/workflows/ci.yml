name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

  # Build and push a throwaway GHCR image for every PR so the branch can be
  # deployed somewhere (e.g. ceres LibreChat) before it ships. Uses the built-in
  # GITHUB_TOKEN (no PAT) and amd64 only. Tag: branch-<slug>. Never publishes npm.
  docker-preview:
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          slug=$(echo "${GITHUB_HEAD_REF}" | tr '[:upper:]/' '[:lower:]-' | tr -cs 'a-z0-9_.-' '-' | sed 's/^-*//;s/-*$//')
          echo "tag=branch-${slug}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/ttpears/bookstack-mcp:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT so the tag push triggers release.yml.
          # The default GITHUB_TOKEN cannot trigger other workflows.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Tag if package.json version changed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v${version}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists — skipping."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"
