name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20 ships with npm 10.x
      - run: npm install -g npm@latest

      - name: Publish to npm with provenance
        # Uses npm trusted publishing via GitHub OIDC (id-token: write).
        # No NPM_TOKEN needed — the npm CLI exchanges the Actions OIDC token
        # for a short-lived registry token at publish time.
        run: npm publish --access public --provenance

      - name: Build MCPB bundle
        run: node scripts/build-mcpb.mjs

      - name: Create GitHub Release with MCPB asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            "bookstack-mcp-${VERSION}.mcpb#BookStack MCP — Claude Desktop / MCPB bundle"

  docker:
    name: Build and push container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR_MINOR=$(echo "$VERSION" | awk -F. '{print $1"."$2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ttpears/bookstack-mcp:${{ steps.version.outputs.version }}
            ghcr.io/ttpears/bookstack-mcp:${{ steps.version.outputs.major_minor }}
            ghcr.io/ttpears/bookstack-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
